name: Build Frappe HR Image

on:
  workflow_dispatch:
  push:
    paths:
      - 'apps.json'
      - '.github/workflows/build-hrms-image.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image (raw docker build)
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          echo "=== 确认 apps.json 存在 ==="
          cat apps.json
          echo ""
          echo "=== 开始构建 ==="
          docker build \
            -f images/layered/Containerfile \
            --secret id=apps_json,src=apps.json \
            --build-arg FRAPPE_BRANCH=version-15 \
            --build-arg FRAPPE_PATH=https://github.com/frappe/frappe \
            --no-cache \
            --progress=plain \
            -t erpnext-with-hrms:v15 \
            .

      - name: Verify image has all 3 apps
        run: |
          echo "=== 镜像信息 ==="
          docker images erpnext-with-hrms:v15
          echo ""
          echo "=== apps 目录内容 ==="
          APPS=$(docker run --rm erpnext-with-hrms:v15 ls /home/frappe/frappe-bench/apps/)
          echo "$APPS"
          echo ""
          echo "$APPS" | grep -qw frappe   || { echo "错误: 缺少 frappe";   exit 1; }
          echo "$APPS" | grep -qw erpnext  || { echo "错误: 缺少 erpnext";  exit 1; }
          echo "$APPS" | grep -qw hrms     || { echo "错误: 缺少 hrms";     exit 1; }
          echo "✓ 三个 app 全部存在"

      - name: Save image as tar
        run: |
          docker save erpnext-with-hrms:v15 -o erpnext-with-hrms-v15.tar
          gzip erpnext-with-hrms-v15.tar
          ls -lh erpnext-with-hrms-v15.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: erpnext-with-hrms-v15
          path: erpnext-with-hrms-v15.tar.gz
          retention-days: 90
