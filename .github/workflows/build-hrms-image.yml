name: Build Frappe HR Image

on:
  workflow_dispatch:
  push:
    paths:
      - 'apps.json'
      - '.github/workflows/build-hrms-image.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: images/layered/Containerfile
          push: false
          load: true
          tags: erpnext-with-hrms:v15
          build-args: |
            FRAPPE_BRANCH=version-15
            FRAPPE_PATH=https://github.com/frappe/frappe
          secret-files: |
            apps_json=apps.json
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image exists
        run: |
          docker images erpnext-with-hrms:v15
          docker run --rm erpnext-with-hrms:v15 ls /home/frappe/frappe-bench/apps/

      - name: Save image as tar
        run: |
          docker save erpnext-with-hrms:v15 -o erpnext-with-hrms-v15.tar
          gzip erpnext-with-hrms-v15.tar
          ls -lh erpnext-with-hrms-v15.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: erpnext-with-hrms-v15
          path: erpnext-with-hrms-v15.tar.gz
          retention-days: 90
